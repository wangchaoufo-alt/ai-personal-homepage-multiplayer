services:
  - type: web
    name: ai-personal-homepage-multiplayer
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: ./data/forum.json
      - key: NEWS_CACHE_PATH
        value: ./data/ai-news.json
      - key: NEWS_REFRESH_INTERVAL_MS
        value: "86400000"
      - key: NEWS_TRANSLATION_ENABLED
        value: "true"
      - key: TRANSLATION_TIMEOUT_MS
        value: "12000"
      - key: LCZ_FORUM_CACHE_PATH
        value: ./data/lcz-forum.json
      - key: LCZ_FORUM_REFRESH_INTERVAL_MS
        value: "3600000"
      - key: LCZ_FORUM_TIMEOUT_MS
        value: "12000"
