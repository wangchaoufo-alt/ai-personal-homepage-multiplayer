services:
  - type: web
    name: ai-personal-homepage-multiplayer
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/forum.sqlite
    disk:
      name: forum-data
      mountPath: /var/data
      sizeGB: 1
